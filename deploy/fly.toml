# Fly.io deploy config for the sign-cli hosted demo.
#   fly launch --copy-config --no-deploy --name sign-cli-demo
#   fly deploy
#
# The free tier (1 shared-cpu-1x machine, auto-stop) is enough; traffic
# parks the machine when idle, restart restores fresh demo state.

app = "sign-cli-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  DEMO_TTL_SECONDS = "14400"
  SIGN_DEMO_RATE_LIMIT = "5"
  SIGN_DEMO_RATE_BURST = "20"
  NODE_ENV = "production"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/web-demo/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
