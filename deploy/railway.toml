# Railway deploy config for the sign-cli hosted demo.
#   railway init
#   railway up
#
# Railway picks up the Dockerfile via the [build] block. PORT is provided
# by the platform; we honour it inside entrypoint.sh.

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile"

[deploy]
startCommand = "./deploy/entrypoint.sh"
healthcheckPath = "/web-demo/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.envVars]
DEMO_TTL_SECONDS = "14400"
SIGN_DEMO_RATE_LIMIT = "5"
SIGN_DEMO_RATE_BURST = "20"
NODE_ENV = "production"
