# Local-only sanity check for the hosted-demo container.
#   docker compose -f deploy/docker-compose.yml up --build
#   open http://localhost:4000/web-demo/
#
# Same image and entrypoint we ship to fly/render/railway, just without the
# platform's restart loop — to test the reset, bring it down and back up.

services:
  sign-cli-demo:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sign-cli-demo:local
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DEMO_TTL_SECONDS: "3600"
      SIGN_DEMO_RATE_LIMIT: "5"
      SIGN_DEMO_RATE_BURST: "20"
    restart: unless-stopped
