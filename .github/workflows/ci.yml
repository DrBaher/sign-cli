name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `claude/**` so stacked PRs (where the base is another claude/* branch
    # rather than main) also trigger CI. Without this, only PRs targeting
    # main get checks, and the rest of the stack runs untested until merge.
    branches: [main, "claude/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Coverage report (Node built-in --experimental-test-coverage)
        run: npm run coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage.lcov
      - name: SignWell smoke (no-ops without credentials)
        env:
          SIGNWELL_API_KEY: ${{ secrets.SIGNWELL_API_KEY }}
          SIGNWELL_BASE_URL: ${{ secrets.SIGNWELL_BASE_URL }}
          SIGNWELL_TEST_MODE: "true"
          SIGNWELL_SMOKE_SIGNER_EMAIL: ${{ secrets.SIGNWELL_SMOKE_SIGNER_EMAIL }}
        run: ./scripts/smoke-signwell.sh
