name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.6.4). Required when running manually."
        required: true
        type: string

jobs:
  guard-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.read.outputs.tag }}
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Verify package.json version matches the tag
        id: read
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF##*/}"
          fi
          want="${tag#v}"
          have=$(node -p "require('./package.json').version")
          if [ "$want" != "$have" ]; then
            echo "::error::Tag $tag (version $want) does not match package.json version $have. Bump package.json before tagging."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$want" >> "$GITHUB_OUTPUT"

  publish-npm:
    needs: [guard-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          # No registry-url: it writes a placeholder NODE_AUTH_TOKEN into .npmrc
          # which npm sends instead of minting an OIDC token. Trusted Publishing
          # needs neither registry-url nor a token.
      - run: npm i -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm (OIDC Trusted Publishing)
        # No NODE_AUTH_TOKEN — npm mints a short-lived OIDC token via id-token:write.
        # Requires a Trusted Publisher registered on npmjs.com for @drbaher/sign-cli
        # (org DrBaher, repo sign-cli, workflow release.yml, environment blank).
        # Idempotent: skip if this exact version is already on npm, so re-dispatching
        # the release (e.g. to rebuild/attach binaries) doesn't fail on a duplicate.
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::notice::$name@$version already published; skipping publish."
            exit 0
          fi
          npm publish --access public --provenance

  package-dist-tarball:
    needs: [guard-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Tar dist + docs
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "sign-cli-${{ needs.guard-version.outputs.version }}-dist.tar.gz" \
            dist README.md AGENTS.md CHANGELOG.md TROUBLESHOOTING.md \
            DISTRIBUTION.md RELEASE.md MIGRATION.md LICENSE \
            docs fixtures package.json scripts/smoke-signwell.sh
          shasum -a 256 sign-cli-*.tar.gz > sign-cli-${{ needs.guard-version.outputs.version }}-dist.tar.gz.sha256
      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: sign-cli-dist
          path: |
            sign-cli-*.tar.gz
            sign-cli-*.tar.gz.sha256

  build-sea:
    needs: [guard-version]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run bundle
      - name: Build SEA binary
        run: npm run build:sea
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sign-${{ matrix.os }}
          path: dist/sign-*

  attach-binaries-to-release:
    needs: [build-sea, package-dist-tarball, guard-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          if [ -f CHANGELOG.md ]; then
            node scripts/extract-changelog.mjs "${{ needs.guard-version.outputs.tag }}" > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "release notes empty; falling back to auto-generated"
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.guard-version.outputs.tag }}
          files: |
            ./artifacts/**/sign-*
            ./artifacts/sign-cli-dist/sign-cli-*.tar.gz
            ./artifacts/sign-cli-dist/sign-cli-*.tar.gz.sha256
          body_path: ${{ steps.notes.outputs.have_notes == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.have_notes != 'true' }}
          draft: false
